<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextSense — Product Vision</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #181824;
      --bg-card-hover: #1e1e2e;
      --bg-surface: #222236;
      --bg-input: #1a1a28;
      --border: #2a2a3e;
      --border-light: #33334d;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b8;
      --text-tertiary: #6a6a82;
      --accent: #c8a2ff;
      --accent-dim: #9b6fdb;
      --accent-glow: rgba(200, 162, 255, 0.08);
      --status-exploring: #f5a623;
      --status-designing: #a78bfa;
      --status-building: #60a5fa;
      --status-shipped: #34d399;
      --status-paused: #6b7280;
      --tag-bg: rgba(255,255,255,0.06);
      --tag-border: rgba(255,255,255,0.1);
      --radius: 10px;
      --radius-sm: 6px;
      --transition: 0.2s ease;
      --linear-blue: #5e6ad2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    #root { min-height: 100vh; }

    ::selection { background: var(--accent); color: var(--bg-primary); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 500px;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(200, 162, 255, 0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .app-container {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .logo-mark {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: var(--bg-primary);
    }

    .header-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-primary); }
    .header-subtitle { font-size: 13px; color: var(--text-tertiary); font-weight: 400; }
    .header-nav { display: flex; gap: 6px; flex-wrap: wrap; }

    .nav-pill {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
      color: var(--text-secondary); background: transparent; border: 1px solid transparent;
      cursor: pointer; transition: all var(--transition);
    }
    .nav-pill:hover { color: var(--text-primary); background: var(--tag-bg); }
    .nav-pill.active { color: var(--text-primary); background: var(--tag-bg); border-color: var(--tag-border); }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      padding-bottom: 80px;
    }

    .feature-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; cursor: pointer; transition: all var(--transition);
      position: relative; overflow: hidden;
    }
    .feature-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); transform: translateY(-1px); }
    .feature-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--card-accent, var(--accent-dim)); opacity: 0; transition: opacity var(--transition);
    }
    .feature-card:hover::after { opacity: 1; }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .card-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.3; }
    .card-summary { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-note-count { font-size: 12px; color: var(--text-tertiary); margin-left: auto; font-family: 'JetBrains Mono', monospace; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px;
      border-radius: 20px; font-size: 12px; font-weight: 500;
      background: var(--tag-bg); border: 1px solid var(--tag-border); white-space: nowrap;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-exploring .status-dot { background: var(--status-exploring); }
    .status-designing .status-dot { background: var(--status-designing); }
    .status-building .status-dot { background: var(--status-building); }
    .status-shipped .status-dot { background: var(--status-shipped); }
    .status-paused .status-dot { background: var(--status-paused); }

    .ship-date { font-size: 12px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }

    .pillar-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--tag-bg);
      color: var(--text-tertiary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;
    }

    .detail-view { padding-bottom: 80px; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px; font-size: 13px;
      color: var(--text-tertiary); text-decoration: none; cursor: pointer;
      margin-bottom: 28px; transition: color var(--transition);
      background: none; border: none; font-family: inherit;
    }
    .back-link:hover { color: var(--text-primary); }

    .detail-header { margin-bottom: 32px; }
    .detail-title { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; line-height: 1.2; }
    .detail-summary { font-size: 16px; color: var(--text-secondary); max-width: 640px; line-height: 1.6; }
    .detail-meta { display: flex; align-items: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

    .editable-field { position: relative; display: inline-flex; align-items: center; }

    .editable-select {
      appearance: none; background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--text-primary); font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 500; padding: 5px 28px 5px 10px; border-radius: var(--radius-sm);
      cursor: pointer; transition: border-color var(--transition);
    }
    .editable-select:hover { border-color: var(--border-light); }
    .editable-select:focus { outline: none; border-color: var(--accent-dim); }
    .editable-select option { background: var(--bg-card); color: var(--text-primary); }

    .editable-input {
      background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 5px 10px;
      border-radius: var(--radius-sm); width: 120px; transition: border-color var(--transition);
    }
    .editable-input:hover { border-color: var(--border-light); }
    .editable-input:focus { outline: none; border-color: var(--accent-dim); }

    .field-label {
      font-size: 11px; color: var(--text-tertiary); text-transform: uppercase;
      letter-spacing: 0.06em; margin-right: 8px; font-weight: 500;
    }

    .detail-sections { display: grid; grid-template-columns: 1fr; gap: 24px; }

    .section-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .section-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); }
    .section-body { padding: 20px; }
    .section-body p { color: var(--text-secondary); font-size: 14px; line-height: 1.7; margin-bottom: 12px; }
    .section-body p:last-child { margin-bottom: 0; }
    .section-body ul { list-style: none; padding: 0; }
    .section-body ul li {
      color: var(--text-secondary); font-size: 14px; line-height: 1.7;
      padding: 4px 0 4px 16px; position: relative;
    }
    .section-body ul li::before { content: '·'; position: absolute; left: 0; color: var(--accent-dim); font-weight: 700; }

    .prototype-area {
      min-height: 300px; display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary); font-size: 14px; background: var(--bg-input); border-radius: var(--radius-sm);
    }
    .prototype-area img { max-width: 100%; height: auto; border-radius: var(--radius-sm); }
    .prototype-area iframe { width: 100%; min-height: 500px; border: none; border-radius: var(--radius-sm); }
    .prototype-placeholder { text-align: center; padding: 40px; }
    .prototype-placeholder-icon {
      width: 48px; height: 48px; border-radius: 12px; background: var(--tag-bg);
      border: 1px dashed var(--border-light); display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px; font-size: 20px; color: var(--text-tertiary);
    }

    .proto-tabs {
      display: flex; gap: 4px; margin-bottom: 12px;
      border-bottom: 1px solid var(--border); padding-bottom: 10px;
    }
    .proto-tab {
      padding: 5px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
      color: var(--text-tertiary); background: transparent; border: 1px solid transparent;
      cursor: pointer; transition: all var(--transition); font-family: 'DM Sans', sans-serif;
    }
    .proto-tab:hover { color: var(--text-secondary); background: var(--tag-bg); }
    .proto-tab.active {
      color: var(--text-primary); background: var(--tag-bg); border-color: var(--tag-border);
    }
    .proto-tab-type { }

    .note-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
    .note-item:last-child { border-bottom: none; }
    .note-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .note-date { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); }
    .note-author { font-size: 12px; color: var(--accent-dim); font-weight: 500; }
    .note-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

    .note-tickets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

    .linear-ticket {
      display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px;
      border-radius: var(--radius-sm); background: rgba(94, 106, 210, 0.1);
      border: 1px solid rgba(94, 106, 210, 0.2); font-size: 12px;
      font-family: 'JetBrains Mono', monospace; color: var(--linear-blue);
      text-decoration: none; transition: all var(--transition); cursor: pointer;
    }
    .linear-ticket:hover { background: rgba(94, 106, 210, 0.18); border-color: rgba(94, 106, 210, 0.35); color: #8b93e6; }
    .linear-ticket-icon { width: 12px; height: 12px; flex-shrink: 0; }
    .linear-ticket-title {
      color: var(--text-secondary); font-family: 'DM Sans', sans-serif; font-size: 12px;
      max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .add-note-form { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg-input); }
    .add-note-input-group { display: flex; flex-direction: column; gap: 8px; }

    .add-note-textarea {
      width: 100%; background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--text-primary); font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 10px 12px; border-radius: var(--radius-sm); resize: vertical;
      min-height: 60px; line-height: 1.5; transition: border-color var(--transition);
    }
    .add-note-textarea:hover { border-color: var(--border-light); }
    .add-note-textarea:focus { outline: none; border-color: var(--accent-dim); }
    .add-note-textarea::placeholder { color: var(--text-tertiary); }

    .add-note-bottom { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .add-note-small-input {
      background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary);
      font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 6px 10px;
      border-radius: var(--radius-sm); transition: border-color var(--transition);
    }
    .add-note-small-input:hover { border-color: var(--border-light); }
    .add-note-small-input:focus { outline: none; border-color: var(--accent-dim); }
    .add-note-small-input::placeholder { color: var(--text-tertiary); }

    .add-note-author-input { width: 140px; }
    .add-note-ticket-input { width: 220px; }

    .add-note-btn {
      padding: 7px 18px; background: var(--accent-dim); color: var(--bg-primary);
      border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition);
      white-space: nowrap; margin-left: auto;
    }
    .add-note-btn:hover { background: var(--accent); }
    .add-note-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .add-note-hint { font-size: 11px; color: var(--text-tertiary); }

    .save-indicator { font-size: 11px; color: var(--text-tertiary); display: inline-flex; align-items: center; gap: 4px; }
    .save-indicator.saving { color: var(--status-exploring); }
    .save-indicator.saved { color: var(--status-shipped); }
    .save-indicator.error { color: #ef4444; }

    .config-banner {
      background: rgba(245, 166, 35, 0.08); border: 1px solid rgba(245, 166, 35, 0.2);
      border-radius: var(--radius); padding: 14px 18px; margin-bottom: 24px;
      font-size: 13px; color: var(--status-exploring); line-height: 1.5;
    }
    .config-banner code {
      background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 3px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
    .empty-state p { font-size: 14px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px; border: 2px solid var(--border);
      border-top-color: var(--accent-dim); border-radius: 50%;
      animation: spin 0.6s linear infinite; display: inline-block;
    }

    @media (max-width: 768px) {
      .gallery { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .detail-title { font-size: 22px; }
      .add-note-bottom { flex-direction: column; align-items: stretch; }
      .add-note-btn { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ═══════════════════════════════════════════════════════
    // CONFIGURATION — Fill these in to enable cloud features
    // ═══════════════════════════════════════════════════════

    const CONFIG = {
      // JSONBin.io — Create a free account at https://jsonbin.io
      // 1. Create a new bin with initial content: {}
      // 2. Copy the Bin ID and your X-Access-Key
      JSONBIN_BIN_ID: '69b2f4f9aa77b81da9dc5cc8',
      JSONBIN_ACCESS_KEY: '$2a$10$biOaW1HmgLmoKzjGEXzHpeOi7qhVG.jzQtXEDYNkNlXfdgzmDWo/m',

      // Linear — Create a read-only Personal API key at
      // https://linear.app/nextsense/settings/api
      LINEAR_API_KEY: 'lin_api_YTrOO9DAm1aEA4dgXglbKCFGD9Ie2jZbqBh1oTgT',
      LINEAR_WORKSPACE: 'nextsense',

      // Ticket ID pattern — matches things like NS-1234, SMART-567
      TICKET_PATTERN: /\b([A-Z]{1,6}-\d{1,6})\b/g,
    };

    const isJsonBinConfigured = () => !!(CONFIG.JSONBIN_BIN_ID && CONFIG.JSONBIN_ACCESS_KEY);
    const isLinearConfigured = () => !!CONFIG.LINEAR_API_KEY;

    // ═══════════════════════════════════════════════════════
    // JSONBin API
    // ═══════════════════════════════════════════════════════

    async function loadFromCloud() {
      if (!isJsonBinConfigured()) return null;
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN_ID}/latest`, {
          headers: { 'X-Access-Key': CONFIG.JSONBIN_ACCESS_KEY },
        });
        if (!res.ok) throw new Error(`JSONBin read: ${res.status}`);
        const data = await res.json();
        return data.record || {};
      } catch (err) {
        console.error('Cloud load failed:', err);
        return null;
      }
    }

    async function saveToCloud(payload) {
      if (!isJsonBinConfigured()) return false;
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.JSONBIN_BIN_ID}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Access-Key': CONFIG.JSONBIN_ACCESS_KEY },
          body: JSON.stringify(payload),
        });
        return res.ok;
      } catch (err) {
        console.error('Cloud save failed:', err);
        return false;
      }
    }

    // ═══════════════════════════════════════════════════════
    // Linear API
    // ═══════════════════════════════════════════════════════

    const ticketCache = {};

    async function fetchLinearTicket(ticketId) {
      if (ticketCache[ticketId]) return ticketCache[ticketId];

      const fallback = {
        id: ticketId,
        title: null,
        url: `https://linear.app/${CONFIG.LINEAR_WORKSPACE}/issue/${ticketId}`,
      };

      if (!isLinearConfigured()) {
        ticketCache[ticketId] = fallback;
        return fallback;
      }

      try {
        const teamKey = ticketId.split('-')[0];
        const number = parseInt(ticketId.split('-')[1], 10);
        const res = await fetch('https://api.linear.app/graphql', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': CONFIG.LINEAR_API_KEY },
          body: JSON.stringify({
            query: `query GetIssue($filter: IssueFilter) {
              issues(filter: $filter, first: 1) {
                nodes { identifier title url }
              }
            }`,
            variables: {
              filter: {
                number: { eq: number },
                team: { key: { eq: teamKey } },
              },
            },
          }),
        });

        if (!res.ok) throw new Error(`Linear API: ${res.status}`);
        const data = await res.json();
        const issue = data?.data?.issues?.nodes?.[0];

        const result = {
          id: ticketId,
          title: issue?.title || null,
          url: issue?.url || fallback.url,
        };
        ticketCache[ticketId] = result;
        return result;
      } catch (err) {
        console.error(`Linear fetch failed for ${ticketId}:`, err);
        ticketCache[ticketId] = fallback;
        return fallback;
      }
    }

    // ═══════════════════════════════════════════════════════
    // FEATURE DATA — Edit here to add features
    // ═══════════════════════════════════════════════════════

    const STATUSES = ['Exploring', 'Designing', 'Building', 'Shipped', 'Paused'];
    const PILLARS = ['Better Sleep', 'Confidence & Reliability', 'Enduring Value'];

    const initialFeatures = [
      {
        id: 'wind-down',
        title: 'Wind-Down Experience',
        summary: 'Pre-sleep audio journey that eases the transition from wakefulness to sleep, using brain-responsive soundscapes.',
        pillar: 'Better Sleep',
        status: 'Building',
        targetDate: 'Q2 2026',
        vision: `<p>Wind-Down is about bridging the gap between "I got into bed" and "I fell asleep." Most people's sleep problems start before they even close their eyes — racing thoughts, residual stress, screen-induced alertness.</p>
<p>The initial scope is 1–2 audio tracks surfaced under Sleep in the Soundscapes section as a lightweight interim solution. The fuller modular Wind-Down Experience — where users choose relaxation building blocks (breathwork, body scan, soundscape, narrative) — remains on the longer-term roadmap.</p>
<p>Robert Thomas is developing the audio content. The key design constraint: it must feel like a natural extension of the sleep session, not a separate "feature" users have to discover and configure.</p>`,
        prototypes: [
          { type: 'placeholder', label: 'Audio Flow', content: 'Wind-Down audio flow prototype coming soon' },
        ],
        defaultNotes: [
          { date: '2026-03-10', author: 'Caitlin', text: 'Scoped interim version: 1–2 tracks under Sleep > Soundscapes.', tickets: [] },
          { date: '2026-02-28', author: 'Caitlin', text: 'Robert delivered first draft audio tracks for review.', tickets: [] },
          { date: '2026-02-15', author: 'Caitlin', text: 'Full modular experience moved to H2 roadmap; shipping lightweight version first.', tickets: [] },
        ],
      },
      {
        id: 'morning-pullup',
        title: 'Morning Pull-Up Screen',
        summary: 'Full-screen post-sleep summary surfacing slow-wave count as the hero stat, replacing the current minimal wake screen.',
        pillar: 'Confidence & Reliability',
        status: 'Building',
        targetDate: 'Q1 2026',
        vision: `<p>The morning moment is the single highest-intent touchpoint we have. When someone takes out their Smartbuds, they want one thing: did it work?</p>
<p>The Morning Pull-Up is a full-screen post-sleep summary that leads with slow-wave count as the hero metric — the one number that distinguishes us from every other tracker. Supporting stats (sleep time, efficiency, latency) sit below, providing context without competing for attention.</p>
<p>Design principle: this screen should feel like a confident answer, not a data dump. Think weather app, not spreadsheet.</p>`,
        prototypes: [
          { type: 'placeholder', label: 'Mockup', content: 'Morning Pull-Up mockup — see Figma link' },
        ],
        defaultNotes: [
          { date: '2026-03-05', author: 'Caitlin', text: 'UX copy finalized. Hero stat: slow-wave count with delta indicator.', tickets: [] },
          { date: '2026-02-20', author: 'Caitlin', text: 'Devo delivered V2 design with simplified stat hierarchy.', tickets: [] },
        ],
      },
      {
        id: 'trends-benchmarking',
        title: 'Trends & Benchmarking 2.0',
        summary: 'Population benchmarks, HealthKit before/after comparisons, and orthosomnia guardrails for longitudinal sleep data.',
        pillar: 'Confidence & Reliability',
        status: 'Designing',
        targetDate: 'Q2 2026',
        vision: `<p>Users consistently ask "is my sleep good?" — and right now we don't have a satisfying answer. Trends 2.0 introduces population-level benchmarking so users can contextualize their data against people of similar age, gender, and activity level.</p>
<p>The HealthKit integration enables before/after comparison: show how sleep metrics have shifted since starting Smartbuds, using the user's own pre-existing Apple Health data as a baseline.</p>
<p>Critical guardrail: orthosomnia risk. We must frame benchmarks as context, not competition. No leaderboards, no "you're in the bottom 20%." Language like "your slow-wave activity is within a healthy range" rather than percentile rankings.</p>`,
        prototypes: [
          { type: 'placeholder', label: 'Wireframes', content: 'Benchmarking UI wireframes in progress' },
        ],
        defaultNotes: [
          { date: '2026-03-08', author: 'Caitlin', text: 'PRD v2 complete. Includes orthosomnia guardrail language guidelines.', tickets: [] },
          { date: '2026-02-25', author: 'Caitlin', text: 'Nivi pulling baseline HealthKit comparison feasibility data.', tickets: [] },
        ],
      },
      {
        id: 'ai-insights',
        title: 'AI Insights',
        summary: 'Personalized daily sleep insights powered by longitudinal EEG data, delivered in a daily home screen slot.',
        pillar: 'Enduring Value',
        status: 'Exploring',
        targetDate: 'H2 2026',
        vision: `<p>AI Insights is the long-term play for making Smartbuds feel like they understand you — not just your last night, but your sleep patterns, your trends, your body's response to behavior changes.</p>
<p>Three-phase delivery model:</p>
<ul>
<li><strong>Phase 1:</strong> Template-based insights (rule-driven, "You had 20% more slow waves after your earlier bedtime")</li>
<li><strong>Phase 2:</strong> Pattern recognition insights (ML-driven, correlating multi-night trends)</li>
<li><strong>Phase 3:</strong> Conversational insights (natural language Q&A about your sleep)</li>
</ul>
<p>Architecture: daily home screen slot that rotates one insight per day. Not a feed, not a notification — a single, high-signal card.</p>`,
        prototypes: [
          { type: 'placeholder', label: 'Insight Card', content: 'Insight card prototype TBD' },
        ],
        defaultNotes: [
          { date: '2026-03-01', author: 'Caitlin', text: 'Defined three-phase delivery model and daily slot architecture.', tickets: [] },
        ],
      },
      {
        id: 'onboarding-copy',
        title: 'In-App Onboarding (Nights 1–4)',
        summary: 'Guided first-four-nights experience focused on fit education, expectation setting, and early churn signal detection.',
        pillar: 'Confidence & Reliability',
        status: 'Shipped',
        targetDate: 'Q1 2026',
        vision: `<p>The first four nights determine whether someone becomes a Smartbuds user or a Smartbuds returner. This onboarding sequence addresses the three biggest early churn drivers: poor fit, unrealistic expectations, and confusion about what the data means.</p>
<p>Night 1 focuses exclusively on fit — getting the physical experience right before anything else. Night 2 introduces the first sleep report with guided interpretation. Nights 3–4 include Day 2/4 check-in screens with radio-pattern instrumentation to capture churn signals early enough to intervene.</p>`,
        prototypes: [
          { type: 'placeholder', label: 'Live App', content: 'Shipped — see live app' },
        ],
        defaultNotes: [
          { date: '2026-02-12', author: 'Caitlin', text: 'Shipped to production. Monitoring Day 2/4 check-in completion rates.', tickets: [] },
          { date: '2026-01-30', author: 'Caitlin', text: 'UX copy for all four nights finalized and handed to eng.', tickets: [] },
        ],
      },
      {
        id: 'live-brainwaves',
        title: 'Live Brainwaves (Signal Visualizer)',
        summary: 'Real-time EEG visualization for user confidence and engagement — renamed from "Signal Visualizer" for consumer clarity.',
        pillar: 'Confidence & Reliability',
        status: 'Shipped',
        targetDate: 'Q1 2026',
        vision: `<p>"Live Brainwaves" serves a trust-building function more than a data function. When users can see their brain activity moving in real time, it answers the fundamental question: "is this thing actually working?"</p>
<p>Renamed from "Signal Visualizer" because consumer users don't think in terms of "signal" — they think in terms of "my brain." The visualization is intentionally simplified: smooth waveforms, not raw EEG noise. Designed to inspire confidence, not anxiety.</p>`,
        prototypes: [
          { type: 'placeholder', label: 'Live App', content: 'Shipped — see live app' },
        ],
        defaultNotes: [
          { date: '2026-01-20', author: 'Caitlin', text: 'Renamed from Signal Visualizer. Shipped in v1.4.', tickets: [] },
        ],
      },
    ];

    // ═══════════════════════════════════════════════════════
    // APP
    // ═══════════════════════════════════════════════════════

    function App() {
      const [features] = useState(initialFeatures);
      const [featureMeta, setFeatureMeta] = useState(() => {
        const meta = {};
        initialFeatures.forEach(f => {
          meta[f.id] = { status: f.status, targetDate: f.targetDate, pillar: f.pillar };
        });
        return meta;
      });
      const [cloudNotes, setCloudNotes] = useState({});
      const [route, setRoute] = useState({ view: 'gallery', featureId: null });
      const [filter, setFilter] = useState('All');
      const [saveStatus, setSaveStatus] = useState('idle');

      // Load from cloud on mount
      useEffect(() => {
        if (!isJsonBinConfigured()) return;
        loadFromCloud().then(data => {
          if (data) {
            if (data.notes) setCloudNotes(data.notes);
            if (data.meta) setFeatureMeta(prev => ({ ...prev, ...data.meta }));
          }
        });
      }, []);

      // Persist helper
      const persist = useCallback(async (notes, meta) => {
        if (!isJsonBinConfigured()) return;
        setSaveStatus('saving');
        const ok = await saveToCloud({ notes, meta });
        setSaveStatus(ok ? 'saved' : 'error');
        if (ok) setTimeout(() => setSaveStatus('idle'), 2000);
      }, []);

      const addNote = useCallback((featureId, note) => {
        setCloudNotes(prev => {
          const updated = { ...prev, [featureId]: [...(prev[featureId] || []), note] };
          persist(updated, featureMeta);
          return updated;
        });
      }, [featureMeta, persist]);

      const updateMeta = useCallback((featureId, updates) => {
        setFeatureMeta(prev => {
          const updated = { ...prev, [featureId]: { ...prev[featureId], ...updates } };
          persist(cloudNotes, updated);
          return updated;
        });
      }, [cloudNotes, persist]);

      const getNotesForFeature = (featureId) => {
        const feature = features.find(f => f.id === featureId);
        const defaults = feature?.defaultNotes || [];
        const cloud = cloudNotes[featureId] || [];
        return [...defaults, ...cloud].sort((a, b) => b.date.localeCompare(a.date));
      };

      // Hash routing
      useEffect(() => {
        const handleHash = () => {
          const hash = window.location.hash.slice(1);
          if (hash && hash !== '/') {
            if (features.find(f => f.id === hash)) {
              setRoute({ view: 'detail', featureId: hash });
              return;
            }
          }
          setRoute({ view: 'gallery', featureId: null });
        };
        handleHash();
        window.addEventListener('hashchange', handleHash);
        return () => window.removeEventListener('hashchange', handleHash);
      }, [features]);

      const navigateTo = useCallback((id) => { window.location.hash = id || '/'; }, []);

      const enriched = features.map(f => ({
        ...f,
        status: featureMeta[f.id]?.status || f.status,
        targetDate: featureMeta[f.id]?.targetDate || f.targetDate,
        pillar: featureMeta[f.id]?.pillar || f.pillar,
        noteCount: (f.defaultNotes?.length || 0) + (cloudNotes[f.id]?.length || 0),
      }));

      const counts = enriched.reduce((a, f) => { a[f.status] = (a[f.status] || 0) + 1; return a; }, {});
      const filtered = filter === 'All' ? enriched : enriched.filter(f => f.status === filter);

      return (
        <div className="app-container">
          <header className="header">
            <div className="header-left">
              <div className="logo-mark">NS</div>
              <div>
                <div className="header-title">Product Vision</div>
                <div className="header-subtitle">NextSense Smartbuds Roadmap</div>
              </div>
            </div>
            {route.view === 'gallery' && (
              <nav className="header-nav">
                <button className={`nav-pill ${filter === 'All' ? 'active' : ''}`} onClick={() => setFilter('All')}>All ({enriched.length})</button>
                {STATUSES.map(s => counts[s] ? (
                  <button key={s} className={`nav-pill ${filter === s ? 'active' : ''}`} onClick={() => setFilter(s)}>{s} ({counts[s]})</button>
                ) : null)}
              </nav>
            )}
          </header>

          {!isJsonBinConfigured() && (
            <div className="config-banner">
              Cloud sync not configured. Add <code>JSONBIN_BIN_ID</code> and <code>JSONBIN_ACCESS_KEY</code> to the CONFIG block to persist notes and metadata.
              {!isLinearConfigured() && <> Add <code>LINEAR_API_KEY</code> to auto-fetch ticket titles from Linear.</>}
            </div>
          )}

          {route.view === 'gallery' ? (
            <Gallery features={filtered} onSelect={navigateTo} />
          ) : (
            <DetailView
              feature={enriched.find(f => f.id === route.featureId)}
              notes={getNotesForFeature(route.featureId)}
              onBack={() => navigateTo(null)}
              onUpdateMeta={updateMeta}
              onAddNote={addNote}
              saveStatus={saveStatus}
            />
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // GALLERY
    // ═══════════════════════════════════════════════════════

    function Gallery({ features, onSelect }) {
      if (!features.length) return <div className="empty-state"><p>No features match this filter.</p></div>;
      return (
        <div className="gallery">
          {features.map(f => <FeatureCard key={f.id} feature={f} onClick={() => onSelect(f.id)} />)}
        </div>
      );
    }

    const accentMap = {
      Exploring: 'var(--status-exploring)', Designing: 'var(--status-designing)',
      Building: 'var(--status-building)', Shipped: 'var(--status-shipped)', Paused: 'var(--status-paused)',
    };

    function FeatureCard({ feature, onClick }) {
      return (
        <div className="feature-card" style={{ '--card-accent': accentMap[feature.status] }} onClick={onClick}>
          <div className="card-header"><div className="card-title">{feature.title}</div></div>
          <div className="card-summary">{feature.summary}</div>
          <div className="card-meta">
            <span className={`status-badge status-${feature.status.toLowerCase()}`}>
              <span className="status-dot"></span>{feature.status}
            </span>
            {feature.targetDate && <span className="ship-date">{feature.targetDate}</span>}
            <span className="pillar-tag">{feature.pillar}</span>
            {feature.noteCount > 0 && <span className="card-note-count">{feature.noteCount} note{feature.noteCount !== 1 ? 's' : ''}</span>}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // DETAIL VIEW
    // ═══════════════════════════════════════════════════════

    function DetailView({ feature, notes, onBack, onUpdateMeta, onAddNote, saveStatus }) {
      if (!feature) {
        return (
          <div className="detail-view">
            <button className="back-link" onClick={onBack}>← All features</button>
            <div className="empty-state"><p>Feature not found.</p></div>
          </div>
        );
      }

      return (
        <div className="detail-view">
          <button className="back-link" onClick={onBack}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            All features
          </button>

          <div className="detail-header">
            <h1 className="detail-title">{feature.title}</h1>
            <p className="detail-summary">{feature.summary}</p>
            <div className="detail-meta">
              <div className="editable-field">
                <span className="field-label">Status</span>
                <select className="editable-select" value={feature.status} onChange={e => onUpdateMeta(feature.id, { status: e.target.value })}>
                  {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div className="editable-field">
                <span className="field-label">Target</span>
                <input className="editable-input" type="text" value={feature.targetDate} onChange={e => onUpdateMeta(feature.id, { targetDate: e.target.value })} placeholder="e.g. Q2 2026" />
              </div>
              <div className="editable-field">
                <span className="field-label">Pillar</span>
                <select className="editable-select" value={feature.pillar} onChange={e => onUpdateMeta(feature.id, { pillar: e.target.value })}>
                  {PILLARS.map(p => <option key={p} value={p}>{p}</option>)}
                </select>
              </div>
              <SaveIndicator status={saveStatus} />
            </div>
          </div>

          <div className="detail-sections">
            <div className="section-block">
              <div className="section-header"><span className="section-title">Prototypes</span></div>
              <div className="section-body"><PrototypeGallery prototypes={feature.prototypes || (feature.prototype ? [feature.prototype] : [])} /></div>
            </div>

            <div className="section-block">
              <div className="section-header"><span className="section-title">Vision & Context</span></div>
              <div className="section-body" dangerouslySetInnerHTML={{ __html: feature.vision }} />
            </div>

            <div className="section-block">
              <div className="section-header">
                <span className="section-title">Notes & Tickets</span>
                <span style={{ fontSize: '12px', color: 'var(--text-tertiary)' }}>{notes.length} note{notes.length !== 1 ? 's' : ''}</span>
              </div>
              <div className="section-body">
                {notes.length === 0 && <p style={{ color: 'var(--text-tertiary)', fontStyle: 'italic' }}>No notes yet.</p>}
                {notes.map((note, i) => <NoteItem key={`${note.date}-${i}`} note={note} />)}
              </div>
              <AddNoteForm featureId={feature.id} onAdd={onAddNote} />
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // NOTE with Linear ticket rendering
    // ═══════════════════════════════════════════════════════

    function NoteItem({ note }) {
      const [tickets, setTickets] = useState([]);

      useEffect(() => {
        if (!note.tickets?.length) return;
        let cancelled = false;
        Promise.all(note.tickets.map(fetchLinearTicket)).then(res => {
          if (!cancelled) setTickets(res);
        });
        return () => { cancelled = true; };
      }, [note.tickets]);

      return (
        <div className="note-item">
          <div className="note-header">
            <span className="note-date">{note.date}</span>
            {note.author && <span className="note-author">{note.author}</span>}
          </div>
          <div className="note-text">{note.text}</div>
          {tickets.length > 0 && (
            <div className="note-tickets">
              {tickets.map(t => (
                <a key={t.id} href={t.url} target="_blank" rel="noopener noreferrer" className="linear-ticket">
                  <svg className="linear-ticket-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5.2 57.1a47.5 47.5 0 0 1 37.7 37.7L5.2 57.1Z" fill="currentColor"/>
                    <path d="M2 50a48 48 0 0 0 3 16.5L43.5 5A48 48 0 0 0 2 50Z" fill="currentColor"/>
                    <path d="M50 2a48 48 0 0 0-3.4.1L5.1 43.6A48 48 0 0 1 50 2Z" fill="currentColor"/>
                    <path d="M98 50A48 48 0 0 1 50 98l48-48Z" fill="currentColor"/>
                    <path d="M98 50A48 48 0 0 0 50 2l48 48Z" fill="currentColor"/>
                  </svg>
                  <span>{t.id}</span>
                  {t.title && <span className="linear-ticket-title">— {t.title}</span>}
                </a>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    // ADD NOTE FORM
    // ═══════════════════════════════════════════════════════

    function AddNoteForm({ featureId, onAdd }) {
      const [text, setText] = useState('');
      const [author, setAuthor] = useState(() => {
        try { return window.localStorage?.getItem('ns-vision-author') || ''; } catch { return ''; }
      });
      const [ticketInput, setTicketInput] = useState('');
      const [submitting, setSubmitting] = useState(false);

      const handleSubmit = async () => {
        if (!text.trim()) return;
        setSubmitting(true);

        // Remember author name for convenience
        try { if (author.trim()) window.localStorage?.setItem('ns-vision-author', author.trim()); } catch {}

        // Parse ticket IDs
        const ticketIds = [];
        if (ticketInput.trim()) {
          // Try regex first
          const matches = ticketInput.match(/\b[A-Z]{1,6}-\d{1,6}\b/g);
          if (matches) ticketIds.push(...matches);
        }

        const note = {
          date: new Date().toISOString().split('T')[0],
          author: author.trim() || 'Anonymous',
          text: text.trim(),
          tickets: [...new Set(ticketIds)],
        };

        await onAdd(featureId, note);
        setText('');
        setTicketInput('');
        setSubmitting(false);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleSubmit();
      };

      return (
        <div className="add-note-form">
          <div className="add-note-input-group">
            <textarea
              className="add-note-textarea"
              placeholder="Add a note... (⌘+Enter to save)"
              value={text}
              onChange={e => setText(e.target.value)}
              onKeyDown={handleKeyDown}
              disabled={submitting}
            />
            <div className="add-note-bottom">
              <input
                className="add-note-small-input add-note-author-input"
                placeholder="Your name"
                value={author}
                onChange={e => setAuthor(e.target.value)}
                onKeyDown={handleKeyDown}
                disabled={submitting}
              />
              <input
                className="add-note-small-input add-note-ticket-input"
                placeholder="Linear tickets (e.g. NS-123, NS-456)"
                value={ticketInput}
                onChange={e => setTicketInput(e.target.value)}
                onKeyDown={handleKeyDown}
                disabled={submitting}
              />
              <button className="add-note-btn" onClick={handleSubmit} disabled={!text.trim() || submitting}>
                {submitting ? <span className="spinner" /> : 'Add note'}
              </button>
            </div>
            {!isJsonBinConfigured() && (
              <div className="add-note-hint">Notes won't persist without JSONBin configured — they'll be lost on refresh.</div>
            )}
          </div>
        </div>
      );
    }

    function SaveIndicator({ status }) {
      if (status === 'idle') return null;
      const map = { saving: ['saving','Saving…'], saved: ['saved','Saved'], error: ['error','Save failed'] };
      const [cls, label] = map[status] || [];
      if (!cls) return null;
      return <span className={`save-indicator ${cls}`}>{status === 'saving' && <span className="spinner" />}{label}</span>;
    }

    function PrototypeGallery({ prototypes }) {
      const [activeIdx, setActiveIdx] = useState(0);

      if (!prototypes || prototypes.length === 0) {
        return (
          <div className="prototype-area">
            <div className="prototype-placeholder">
              <div className="prototype-placeholder-icon">◇</div>
              <div>No prototypes attached yet</div>
            </div>
          </div>
        );
      }

      const current = prototypes[activeIdx] || prototypes[0];
      const hasMultiple = prototypes.length > 1;

      const typeLabel = (p) => {
        if (p.label) return p.label;
        const labels = { figma: 'Figma', image: 'Screenshot', html: 'Interactive', placeholder: 'Placeholder' };
        return labels[p.type] || p.type;
      };

      return (
        <div>
          {hasMultiple && (
            <div className="proto-tabs">
              {prototypes.map((p, i) => (
                <button
                  key={i}
                  className={`proto-tab ${i === activeIdx ? 'active' : ''}`}
                  onClick={() => setActiveIdx(i)}
                >
                  <span className="proto-tab-type">{typeLabel(p)}</span>
                </button>
              ))}
            </div>
          )}
          <PrototypeEmbed prototype={current} />
        </div>
      );
    }

    function PrototypeEmbed({ prototype }) {
      if (!prototype || prototype.type === 'placeholder') {
        return (
          <div className="prototype-area">
            <div className="prototype-placeholder">
              <div className="prototype-placeholder-icon">◇</div>
              <div>{prototype?.content || 'No prototype attached yet'}</div>
            </div>
          </div>
        );
      }
      if (prototype.type === 'image') return <div className="prototype-area"><img src={prototype.src} alt={prototype.alt || 'Prototype'} /></div>;
      if (prototype.type === 'figma') return <div className="prototype-area"><iframe src={`https://www.figma.com/embed?embed_host=nextsense&url=${encodeURIComponent(prototype.url)}`} allowFullScreen /></div>;
      if (prototype.type === 'html') return <div className="prototype-area"><iframe srcDoc={prototype.html} style={{ width: '100%', minHeight: '500px', border: 'none' }} /></div>;
      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
